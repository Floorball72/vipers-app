<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorer — Stackflow</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0d0f;--bg2:#141518;--bg3:#1c1d22;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#eceaf4;--text2:#8f8d9a;--text3:#4e4c58;--accent:#d4f04a;--accent2:#b8d93a;--purple:#9b8fff;--blue:#5bbfff;--green:#4dd68c;--amber:#ffbe47;--red:#ff6b6b;--r:10px;--r-lg:16px}
*{box-sizing:border-box;margin:0;padding:0}
a{text-decoration:none}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{width:230px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:7px;display:grid;place-items:center;flex-shrink:0}
.logo-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;line-height:1.2}
.logo-sub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:.1em}
.nav{padding:10px 8px;flex:1}
.nav-sec{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:14px 10px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .12s;text-decoration:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(212,240,74,.1);color:var(--accent);font-weight:500}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.main{flex:1;min-width:0}
.topbar{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.page-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700}
.page-sub{font-size:12px;color:var(--text3);margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;padding:8px 16px;border-radius:8px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-accent{background:var(--accent);color:#0c0d0f}.btn-accent:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-ghost:hover{color:var(--text)}
.content{padding:24px 28px}
.team-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.team-pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);color:var(--text2);background:transparent;transition:all .12s;font-family:'DM Sans',sans-serif}
.team-pill:hover{color:var(--text)}
.team-pill.active{background:rgba(212,240,74,.1);border-color:rgba(212,240,74,.4);color:var(--accent)}
.two-col{display:grid;grid-template-columns:1fr 340px;gap:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{padding:10px 20px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border)}
th.num{text-align:right}
td{padding:11px 20px;font-size:13px;border-bottom:1px solid var(--border)}
td.num{text-align:right;font-family:'DM Mono',monospace}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.rank-num{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);width:28px}
.rank-1{color:var(--amber)}
.rank-2{color:var(--text2)}
.rank-3{color:var(--text2)}
.bar-bg{height:4px;background:var(--border);border-radius:2px;margin-top:3px}
.bar-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .4s}
.pts-badge{display:inline-flex;align-items:center;justify-content:center;width:36px;height:20px;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;background:rgba(212,240,74,.1);color:var(--accent)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-lg);padding:26px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:20px}
.form-grid{display:grid;gap:14px}
.form-row-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-label{display:block;font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-title{font-size:15px;font-weight:500;color:var(--text2);margin-bottom:6px}
.icon-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.icon-btn.del:hover{color:var(--red);border-color:rgba(255,107,107,.3);background:rgba(255,107,107,.08)}
.row-actions{display:flex;gap:5px;opacity:0;transition:opacity .15s}
tr:hover .row-actions{opacity:1}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>
<script src="config.js"></script>
<script>
// Config aus config.js
const CONFIG = APP_CONFIG;
let db=null,CLUB_ID="uhc-jonschwil",scorer=[],teams=[],players=[],games=[],activeTeam='all';

async function initDB(){
  const mod=await import('https://esm.sh/@supabase/supabase-js@2.39.0');
  db=mod.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY);
  CLUB_ID=APP_CONFIG.ACTIVE_CLUB.club_id;
  await loadAll();
}

async function loadAll(){
  const[t,s,p,g]=await Promise.all([
    db.from('teams').select('*').eq('club_id',CLUB_ID).eq('aktiv',true).order('name'),
    db.from('scorer').select('*, players(vorname,nachname,nummer,team_id), games(datum,gegner,teams(name))').eq('club_id',CLUB_ID).order('tore',{ascending:false}),
    db.from('players').select('*').eq('club_id',CLUB_ID).eq('aktiv',true).order('nachname'),
    db.from('games').select('*,teams(name)').eq('club_id',CLUB_ID).order('datum',{ascending:false}),
  ]);
  teams=t.data||[];players=p.data||[];scorer=s.data||[];games=g.data||[];
  buildTeamPills();
  render();
}

function buildTeamPills(){
  const cont=document.getElementById('team-pills');
  cont.innerHTML='<button class="team-pill active" data-team="all" onclick="setTeam(\'all\',this)">Alle Teams</button>';
  teams.forEach(t=>{cont.innerHTML+=`<button class="team-pill" data-team="${t.id}" onclick="setTeam('${t.id}',this)">${t.name.replace('UHC Jonschwil ','')}</button>`;});
}

function setTeam(id,el){
  activeTeam=id;
  document.querySelectorAll('.team-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  render();
}

function getTeamScorer(){
  let s=scorer;
  if(activeTeam!=='all') s=s.filter(x=>x.players&&x.players.team_id===activeTeam);
  // Aggregiere pro Spieler
  const map={};
  s.forEach(row=>{
    const pid=row.player_id;
    if(!map[pid]) map[pid]={player:row.players,tore:0,assists:0,punkte:0,spiele:0,strafmin:0,ids:[]};
    map[pid].tore+=row.tore||0;
    map[pid].assists+=row.assists||0;
    map[pid].punkte+=(row.tore||0)+(row.assists||0);
    map[pid].strafmin+=row.strafminuten||0;
    map[pid].spiele+=1;
    map[pid].ids.push(row.id);
  });
  return Object.values(map).sort((a,b)=>b.punkte-a.punkte);
}

function render(){
  const data=getTeamScorer();
  const maxPts=data[0]?.punkte||1;
  const tbody=document.getElementById('scorer-tbody');
  if(data.length===0){
    tbody.innerHTML='<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text3)">Keine Scorer-Daten. Trage Statistiken über "+ Statistik" ein.</td></tr>';
  } else {
    tbody.innerHTML=data.map((d,i)=>{
      const p=d.player;
      const name=p?`${p.vorname} ${p.nachname}`:'Unbekannt';
      const num=p?.nummer||'–';
      const rankCls=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
      return `<tr>
        <td><span class="rank-num ${rankCls}">${i+1}</span></td>
        <td><div style="font-weight:500">${name}</div><div style="font-size:11px;color:var(--text3)">#${num}</div></td>
        <td class="num" style="color:var(--amber)">${d.tore}</td>
        <td class="num" style="color:var(--blue)">${d.assists}</td>
        <td class="num"><span class="pts-badge">${d.punkte}</span></td>
        <td class="num" style="color:var(--text3)">${d.spiele}</td>
        <td class="num" style="color:var(--text3)">${d.strafmin}</td>
      </tr>`;
    }).join('');
  }

  // Top Torschützen (Sidebar)
  const topTore=data.filter(d=>d.tore>0).slice(0,5);
  document.getElementById('top-tore').innerHTML=topTore.length===0?'<div style="padding:16px;text-align:center;color:var(--text3);font-size:12px">Keine Daten</div>':topTore.map((d,i)=>{
    const p=d.player;
    const name=p?`${p.vorname} ${p.nachname}`:'–';
    return `<div style="padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">
      <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);width:16px">${i+1}</span>
      <div style="flex:1"><div style="font-size:12px;font-weight:500">${name}</div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(d.tore/topTore[0].tore*100)}%;background:var(--amber)"></div></div></div>
      <span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--amber)">${d.tore}</span>
    </div>`;
  }).join('');

  // Top Assistgeber
  const topAss=[...data].sort((a,b)=>b.assists-a.assists).filter(d=>d.assists>0).slice(0,5);
  document.getElementById('top-assists').innerHTML=topAss.length===0?'<div style="padding:16px;text-align:center;color:var(--text3);font-size:12px">Keine Daten</div>':topAss.map((d,i)=>{
    const p=d.player;
    const name=p?`${p.vorname} ${p.nachname}`:'–';
    return `<div style="padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">
      <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);width:16px">${i+1}</span>
      <div style="flex:1"><div style="font-size:12px;font-weight:500">${name}</div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(d.assists/topAss[0].assists*100)}%;background:var(--blue)"></div></div></div>
      <span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--blue)">${d.assists}</span>
    </div>`;
  }).join('');
}

// Modals
function openAddScorer(){
  // Spieler-Select befüllen
  const sel=document.getElementById('sf-player');
  sel.innerHTML='<option value="">– Spieler wählen –</option>';
  players.forEach(p=>{sel.innerHTML+=`<option value="${p.id}">#${p.nummer||'?'} ${p.vorname} ${p.nachname}</option>`;});
  // Spiele-Select
  const gsel=document.getElementById('sf-game');
  gsel.innerHTML='<option value="">– Spiel wählen –</option>';
  games.slice(0,20).forEach(g=>{
    const d=new Date(g.datum+'T12:00:00').toLocaleDateString('de-CH',{day:'numeric',month:'short'});
    gsel.innerHTML+=`<option value="${g.id}">${d} vs. ${g.gegner}</option>`;
  });
  document.getElementById('sf-tore').value=0;
  document.getElementById('sf-assists').value=0;
  document.getElementById('sf-strafmin').value=0;
  document.getElementById('scorerModal').classList.add('open');
}

async function saveScorer(){
  const pid=document.getElementById('sf-player').value;
  const gid=document.getElementById('sf-game').value;
  if(!pid){alert('Bitte Spieler wählen.');return;}
  const data={
    club_id:CLUB_ID,player_id:pid,game_id:gid||null,
    tore:parseInt(document.getElementById('sf-tore').value)||0,
    assists:parseInt(document.getElementById('sf-assists').value)||0,
    strafminuten:parseInt(document.getElementById('sf-strafmin').value)||0,
    saison:'2024/25'
  };
  // Upsert: falls Eintrag für diesen Spieler+Spiel existiert, updaten
  await db.from('scorer').upsert([{club_id:CLUB_ID,...data}],{onConflict:'player_id,game_id'});
  document.getElementById('scorerModal').classList.remove('open');
  await loadAll();
}

async function deleteScorer(playerId){
  if(!confirm('Alle Statistikeinträge für diesen Spieler löschen?'))return;
  await db.from('scorer').delete().eq('player_id',playerId).eq('club_id',CLUB_ID);
  await loadAll();
}
async function openEditScorer(playerId){
  const p=players.find(x=>x.id===playerId);
  if(!p){alert('Spieler nicht gefunden');return;}
  // Öffne Modal mit Spieler vorausgewählt
  openAddScorer();
  setTimeout(()=>{
    document.getElementById('sf-player').value=playerId;
  },50);
}
document.addEventListener('click',e=>{if(e.target.classList.contains('overlay'))e.target.classList.remove('open');});
initDB().catch(e=>{console.error(e);});
</script>

<div class="shell">
  <div id="nav-placeholder"></div>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title">Scorer & Statistiken</div>
        <div class="page-sub">APP_CONFIG.ACTIVE_CLUB.name+' ·' Saison 2024/25</div>
      </div>
      <button class="btn btn-accent" onclick="openAddScorer()">+ Statistik eintragen</button>
    </div>
    <div class="content">
      <div class="team-pills" id="team-pills"></div>
      <div class="two-col">
        <div class="card">
          <div class="card-header">
            <span class="card-title">Scorerliste</span>
            <span style="font-size:11px;color:var(--text3)">sortiert nach Punkten</span>
          </div>
          <table>
            <thead><tr><th>#</th><th>Spieler</th><th class="num" style="color:var(--amber)">Tore</th><th class="num" style="color:var(--blue)">Assists</th><th class="num">Pkt.</th><th class="num">Sp.</th><th class="num">Str.</th></tr></thead>
            <tbody id="scorer-tbody"><tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text3)">Lade...</td></tr></tbody>
          </table>
        </div>
        <div>
          <div class="card" style="margin-bottom:12px">
            <div class="card-header"><span class="card-title">Top Torschützen</span></div>
            <div id="top-tore"></div>
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">Top Assistgeber</span></div>
            <div id="top-assists"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="scorerModal">
  <div class="modal">
    <div class="modal-title">Statistik eintragen</div>
    <div class="form-grid">
      <div><label class="form-label">Spieler</label><select class="form-input" id="sf-player"></select></div>
      <div><label class="form-label">Spiel (optional)</label><select class="form-input" id="sf-game"></select></div>
      <div class="form-row-4">
        <div><label class="form-label">Tore</label><input class="form-input" type="number" id="sf-tore" min="0" value="0" style="text-align:center;font-size:20px;padding:10px"></div>
        <div><label class="form-label">Assists</label><input class="form-input" type="number" id="sf-assists" min="0" value="0" style="text-align:center;font-size:20px;padding:10px"></div>
        <div><label class="form-label">Strafmin.</label><input class="form-input" type="number" id="sf-strafmin" min="0" value="0" style="text-align:center;font-size:20px;padding:10px"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="document.getElementById('scorerModal').classList.remove('open')">Abbrechen</button>
      <button class="btn btn-accent" onclick="saveScorer()">Speichern</button>
    </div>
  </div>
</div>

<script src="nav.js"></script><script>renderNav('scorer');</script>
</body></html>
