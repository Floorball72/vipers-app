<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzen — UHC Jonschwil Vipers</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0c0d0f;--bg2:#141518;--bg3:#1c1d22;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#eceaf4;--text2:#8f8d9a;--text3:#4e4c58;--accent:#d4f04a;--accent2:#b8d93a;--purple:#9b8fff;--blue:#5bbfff;--green:#4dd68c;--amber:#ffbe47;--red:#ff6b6b;--r:10px;--r-lg:16px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .shell{display:flex;min-height:100vh}
  .sidebar{width:230px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
  .logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .logo-mark{width:32px;height:32px;background:var(--accent);border-radius:7px;display:grid;place-items:center;flex-shrink:0}
  .logo-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;line-height:1.2}
  .logo-sub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:.1em}
  .nav{padding:10px 8px;flex:1}
  .nav-sec{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:14px 10px 5px}
  .nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .12s;text-decoration:none}
  .nav-item:hover{background:var(--bg3);color:var(--text)}
  .nav-item.active{background:rgba(212,240,74,.1);color:var(--accent);font-weight:500}
  .nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
  .nav-item.active svg{opacity:1}
  .main{flex:1;min-width:0}
  .topbar{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .page-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700}
  .page-sub{font-size:12px;color:var(--text3);margin-top:2px}
  .btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;padding:8px 16px;border-radius:8px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s}
  .btn-accent{background:var(--accent);color:#0c0d0f}.btn-accent:hover{background:var(--accent2)}
  .btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-ghost:hover{color:var(--text)}
  .content{padding:24px 28px}
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
  .stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
  .stat-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
  .stat-val{font-family:'DM Mono',monospace;font-size:24px;font-weight:400}
  .stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
  .stat-hi .stat-val{color:var(--accent)}
  .stat-green .stat-val{color:var(--green)}
  .stat-red .stat-val{color:var(--red)}
  .two-col{display:grid;grid-template-columns:1fr 300px;gap:16px}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
  .card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:600}
  table{width:100%;border-collapse:collapse}
  th{padding:10px 20px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border)}
  td{padding:11px 20px;font-size:13px;border-bottom:1px solid var(--border)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(255,255,255,.02)}
  .amount-plus{color:var(--green);font-family:'DM Mono',monospace;font-weight:500}
  .amount-minus{color:var(--red);font-family:'DM Mono',monospace;font-weight:500}
  .badge{display:inline-flex;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
  .badge-ein{background:rgba(77,214,140,.1);color:var(--green);border:1px solid rgba(77,214,140,.2)}
  .badge-aus{background:rgba(255,107,107,.1);color:var(--red);border:1px solid rgba(255,107,107,.2)}
  .row-actions{display:flex;gap:5px;opacity:0;transition:opacity .15s}
  tr:hover .row-actions{opacity:1}
  .icon-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
  .icon-btn.del:hover{color:var(--red);border-color:rgba(255,107,107,.3);background:rgba(255,107,107,.08)}
  /* Kategorien Chart */
  .kat-row{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .kat-row:last-child{border-bottom:none}
  .kat-bar-bg{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
  .kat-bar{height:100%;border-radius:3px;transition:width .4s}
  .kat-bar.ein{background:var(--green)}
  .kat-bar.aus{background:var(--red)}
  /* Filter */
  .filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .filter-pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);color:var(--text2);background:transparent;transition:all .12s;font-family:'DM Sans',sans-serif}
  .filter-pill:hover{border-color:var(--border);color:var(--text)}
  .filter-pill.active{background:rgba(212,240,74,.1);border-color:rgba(212,240,74,.4);color:var(--accent)}
  /* Upload */
  .upload-area{border:1px dashed var(--border2);border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:all .15s;font-size:12px;color:var(--text3)}
  .upload-area:hover{border-color:var(--accent);color:var(--accent)}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
  .overlay.open{display:flex}
  .modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-lg);padding:26px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
  .modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:20px}
  .form-grid{display:grid;gap:14px}
  .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .form-label{display:block;font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
  .form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
  .form-input:focus{border-color:var(--accent)}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
  .empty{text-align:center;padding:40px 20px;color:var(--text3)}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>
<script>
const CONFIG={SUPABASE_URL:'https://kpskzbqrfvihxfynwvpv.supabase.co',SUPABASE_KEY:'sb_publishable_eyDYEuo2aQKLLWX_0c8n-g_AttYd0La'};
let db=null,buchungen=[],filterTyp='all';

async function initDB(){
  const mod=await import('https://esm.sh/@supabase/supabase-js@2');
  db=mod.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_KEY);
  await loadBuchungen();
}
async function loadBuchungen(){
  const{data}=await db.from('finanzen').select('*').order('datum',{ascending:false});
  buchungen=data||[];
  render();
}

function CHF(n){return 'CHF '+parseFloat(n).toLocaleString('de-CH',{minimumFractionDigits:2,maximumFractionDigits:2});}

function render(){
  const filtered=filterTyp==='all'?buchungen:buchungen.filter(b=>b.typ===filterTyp);
  const einnahmen=buchungen.filter(b=>b.typ==='einnahme').reduce((s,b)=>s+parseFloat(b.betrag),0);
  const ausgaben=buchungen.filter(b=>b.typ==='ausgabe').reduce((s,b)=>s+parseFloat(b.betrag),0);
  const saldo=einnahmen-ausgaben;

  document.getElementById('stat-saldo').textContent=CHF(saldo);
  document.getElementById('stat-saldo').style.color=saldo>=0?'var(--green)':'var(--red)';
  document.getElementById('stat-ein').textContent=CHF(einnahmen);
  document.getElementById('stat-aus').textContent=CHF(ausgaben);
  document.getElementById('stat-count').textContent=buchungen.length;

  // Tabelle
  const tbody=document.getElementById('buchungen-tbody');
  if(filtered.length===0){
    tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text3)">Keine Buchungen</td></tr>';
  } else {
    tbody.innerHTML=filtered.map(b=>{
      const d=new Date(b.datum+'T12:00:00').toLocaleDateString('de-CH',{day:'numeric',month:'short',year:'2-digit'});
      const plus=b.typ==='einnahme';
      return `<tr>
        <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)">${d}</td>
        <td><span class="badge ${plus?'badge-ein':'badge-aus'}">${plus?'Einnahme':'Ausgabe'}</span></td>
        <td>${b.beschreibung||'–'}</td>
        <td style="color:var(--text2);font-size:12px">${b.kategorie||'–'}</td>
        <td class="${plus?'amount-plus':'amount-minus'}">${plus?'+':'–'}${CHF(b.betrag)}</td>
        <td><div class="row-actions">
          ${b.beleg_url?`<a href="${b.beleg_url}" target="_blank" class="icon-btn" title="Beleg öffnen"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M6 3H3v10h10V10M10 2h4v4M14 2L8 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></a>`:''}
          <button class="icon-btn del" onclick="deleteBuchung('${b.id}')"><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 5h10M6 5V3h4v2M6 8v4M10 8v4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></button>
        </div></td>
      </tr>`;
    }).join('');
  }

  // Kategorien
  const katMap={};
  filtered.forEach(b=>{const k=b.kategorie||'Sonstiges';katMap[k]=(katMap[k]||0)+parseFloat(b.betrag);});
  const maxKat=Math.max(...Object.values(katMap),1);
  document.getElementById('kategorien').innerHTML=Object.entries(katMap).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([k,v])=>`
    <div class="kat-row">
      <div style="font-size:12px;color:var(--text2);width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${k}</div>
      <div class="kat-bar-bg"><div class="kat-bar aus" style="width:${Math.round(v/maxKat*100)}%"></div></div>
      <div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);width:90px;text-align:right">${CHF(v)}</div>
    </div>`).join('');
}

function setFilter(typ,el){
  filterTyp=typ;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  render();
}

let editId=null;
function openModal(typ){
  editId=null;
  document.getElementById('bf-typ').value=typ||'ausgabe';
  document.getElementById('bf-betrag').value='';
  document.getElementById('bf-beschreibung').value='';
  document.getElementById('bf-kategorie').value='';
  document.getElementById('bf-datum').value=new Date().toISOString().split('T')[0];
  document.getElementById('buchungModal').classList.add('open');
}
function closeModal(){document.getElementById('buchungModal').classList.remove('open');}

async function saveBuchung(){
  const betrag=parseFloat(document.getElementById('bf-betrag').value);
  if(!betrag||betrag<=0){alert('Bitte gültigen Betrag eingeben.');return;}
  const data={
    typ:document.getElementById('bf-typ').value,
    betrag,
    beschreibung:document.getElementById('bf-beschreibung').value||null,
    kategorie:document.getElementById('bf-kategorie').value||null,
    datum:document.getElementById('bf-datum').value,
  };
  await db.from('finanzen').insert([data]);
  closeModal();
  await loadBuchungen();
}
async function deleteBuchung(id){
  if(!confirm('Buchung wirklich löschen?'))return;
  await db.from('finanzen').delete().eq('id',id);
  await loadBuchungen();
}
document.addEventListener('click',e=>{if(e.target.classList.contains('overlay'))e.target.classList.remove('open');});
initDB().catch(()=>{document.getElementById('buchungen-tbody').innerHTML='<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text3)">Verbindungsfehler</td></tr>';});
</script>

<div class="shell">
  <div id="nav-placeholder"></div>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title">Finanzen</div>
        <div class="page-sub">UHC Jonschwil Vipers · Einnahmen & Ausgaben</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" onclick="openModal('einnahme')">+ Einnahme</button>
        <button class="btn btn-accent" onclick="openModal('ausgabe')">+ Ausgabe</button>
      </div>
    </div>
    <div class="content">
      <div class="stat-grid">
        <div class="stat" style="border-color:rgba(212,240,74,.2)"><div class="stat-label">Saldo</div><div class="stat-val" id="stat-saldo">–</div></div>
        <div class="stat"><div class="stat-label">Einnahmen</div><div class="stat-val" style="color:var(--green);font-size:18px" id="stat-ein">–</div></div>
        <div class="stat"><div class="stat-label">Ausgaben</div><div class="stat-val" style="color:var(--red);font-size:18px" id="stat-aus">–</div></div>
        <div class="stat"><div class="stat-label">Buchungen</div><div class="stat-val" id="stat-count">–</div></div>
      </div>

      <div class="two-col">
        <div class="card">
          <div class="card-header">
            <span class="card-title">Buchungen</span>
            <div class="filter-row" style="margin:0">
              <button class="filter-pill active" onclick="setFilter('all',this)">Alle</button>
              <button class="filter-pill" onclick="setFilter('einnahme',this)">Einnahmen</button>
              <button class="filter-pill" onclick="setFilter('ausgabe',this)">Ausgaben</button>
            </div>
          </div>
          <table>
            <thead><tr><th>Datum</th><th>Typ</th><th>Beschreibung</th><th>Kategorie</th><th>Betrag</th><th></th></tr></thead>
            <tbody id="buchungen-tbody"><tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text3)">Lade...</td></tr></tbody>
          </table>
        </div>

        <div>
          <div class="card" style="margin-bottom:12px">
            <div class="card-header"><span class="card-title">Nach Kategorie</span></div>
            <div id="kategorien"></div>
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">Beleg hochladen</span></div>
            <div style="padding:14px">
              <div class="upload-area" onclick="alert('Datei-Upload wird in der nächsten Version via Supabase Storage aktiviert.')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" style="display:block;margin:0 auto 8px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                PDF oder Bild hochladen<br><span style="font-size:11px">Belege werden in Supabase Storage gespeichert</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Buchung -->
<div class="overlay" id="buchungModal">
  <div class="modal" style="max-width:420px">
    <div class="modal-title">Buchung erfassen</div>
    <div class="form-grid">
      <div class="form-row-2">
        <div><label class="form-label">Typ</label>
          <select class="form-input" id="bf-typ">
            <option value="ausgabe">Ausgabe</option><option value="einnahme">Einnahme</option>
          </select>
        </div>
        <div><label class="form-label">Betrag (CHF)</label><input class="form-input" type="number" id="bf-betrag" min="0" step="0.05" placeholder="0.00"></div>
      </div>
      <div><label class="form-label">Beschreibung</label><input class="form-input" type="text" id="bf-beschreibung" placeholder="z.B. Schiedsrichterhonorar"></div>
      <div class="form-row-2">
        <div><label class="form-label">Kategorie</label>
          <select class="form-input" id="bf-kategorie">
            <option value="">– wählen –</option>
            <option>Schiedsrichter</option><option>Material</option><option>Halle</option>
            <option>Eintritt</option><option>Buffet/Bar</option><option>Reisekosten</option>
            <option>Lizenzgebühren</option><option>Versicherung</option><option>Werbung</option><option>Sonstiges</option>
          </select>
        </div>
        <div><label class="form-label">Datum</label><input class="form-input" type="date" id="bf-datum"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-accent" onclick="saveBuchung()">Speichern</button>
    </div>
  </div>
</div>

<script src="nav.js"></script>
<script>renderNav('finanzen');</script>
</body>
</html>
