<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mein Profil — Stackflow</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
a{text-decoration:none}
:root{--bg:#0c0d0f;--bg2:#141518;--bg3:#1c1d22;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#eceaf4;--text2:#8f8d9a;--text3:#4e4c58;--accent:#d4f04a;--accent2:#b8d93a;--purple:#9b8fff;--blue:#5bbfff;--green:#4dd68c;--amber:#ffbe47;--red:#ff6b6b;--r:10px;--r-lg:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{width:230px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:7px;display:grid;place-items:center;flex-shrink:0}
.logo-name{font-family:"Syne",sans-serif;font-size:13px;font-weight:700;line-height:1.2}
.logo-sub{font-size:10px;color:var(--text3);font-family:"DM Mono",monospace;letter-spacing:.1em}
.nav{padding:10px 8px;flex:1}
.nav-sec{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:14px 10px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .12s;text-decoration:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(212,240,74,.1);color:var(--accent);font-weight:500}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.main{flex:1;min-width:0}
.topbar{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text3);cursor:pointer;transition:color .12s;border:none;background:none;font-family:"DM Sans",sans-serif;padding:0;text-decoration:none}
.back-btn:hover{color:var(--text)}
.page-title{font-family:"Syne",sans-serif;font-size:22px;font-weight:700}
.content{padding:28px;max-width:680px}
.profile-hero{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px;display:flex;align-items:center;gap:20px;margin-bottom:20px}
.avatar-large{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"Syne",sans-serif;font-size:22px;font-weight:700;flex-shrink:0}
.hero-name{font-family:"Syne",sans-serif;font-size:20px;font-weight:700}
.hero-meta{font-size:13px;color:var(--text2);margin-top:3px}
.role-badge{display:inline-flex;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;margin-top:6px}
.role-admin{background:rgba(212,240,74,.15);color:var(--accent);border:1px solid rgba(212,240,74,.3)}
.role-trainer{background:rgba(155,143,255,.15);color:var(--purple);border:1px solid rgba(155,143,255,.3)}
.role-spieler{background:rgba(91,191,255,.12);color:var(--blue);border:1px solid rgba(91,191,255,.25)}
.role-eltern{background:rgba(77,214,140,.1);color:var(--green);border:1px solid rgba(77,214,140,.2)}
.section-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:16px}
.section-header{padding:14px 20px;border-bottom:1px solid var(--border);font-family:"Syne",sans-serif;font-size:14px;font-weight:600}
.section-body{padding:20px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-row-1{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:"DM Sans",sans-serif;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--accent)}
.form-input:disabled{opacity:.5;cursor:not-allowed}
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;padding:9px 18px;border-radius:8px;cursor:pointer;border:none;font-family:"DM Sans",sans-serif;transition:all .15s}
.btn-accent{background:var(--accent);color:#0c0d0f}.btn-accent:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-ghost:hover{color:var(--text)}
.btn-danger{background:rgba(255,107,107,.1);color:var(--red);border:1px solid rgba(255,107,107,.25)}.btn-danger:hover{background:rgba(255,107,107,.2)}
.alert{padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}
.alert.success{background:rgba(77,214,140,.1);border:1px solid rgba(77,214,140,.25);color:var(--green)}
.alert.error{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.25);color:var(--red)}
.player-link-card{background:rgba(91,191,255,.06);border:1px solid rgba(91,191,255,.2);border-radius:8px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.player-link-avatar{width:36px;height:36px;border-radius:50%;background:rgba(91,191,255,.15);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--blue);flex-shrink:0}
.player-search-wrap{position:relative}
.player-results{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;margin-top:4px;z-index:10;display:none;max-height:180px;overflow-y:auto}
.player-results.open{display:block}
.player-result-item{padding:10px 14px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px;transition:background .12s}
.player-result-item:hover{background:var(--bg3)}
.p-avatar-sm{width:28px;height:28px;border-radius:50%;background:rgba(91,191,255,.15);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--blue);flex-shrink:0}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>
<script src="config.js"></script>
<script>
// Config aus config.js
const CONFIG = APP_CONFIG;
let db=null,CLUB_ID="uhc-jonschwil",authClient=null,currentUser=null,linkedPlayer=null,allPlayers=[];
const roleColors={admin:"var(--accent)",trainer:"var(--purple)",spieler:"var(--blue)",eltern:"var(--green)"};
const roleLabels={admin:"Admin",trainer:"Trainer",spieler:"Spieler",eltern:"Eltern"};
const roleBadges={admin:"role-admin",trainer:"role-trainer",spieler:"role-spieler",eltern:"role-eltern"};

async function init(){
  const mod=await import("https://esm.sh/@supabase/supabase-js@2");
  const client=mod.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY);
  db=client;authClient=client.auth;

  // User aus localStorage + Session prüfen
  const stored=JSON.parse(localStorage.getItem("vipers_user")||"null");
  if(!stored){window.location.replace("login.html");return;}
  currentUser=stored;

  // Frische Daten aus DB laden
  const{data:profile}=await db.from("user_profiles").select("*").eq("id",stored.id).single();
  if(profile){
    currentUser={...profile,email:stored.email};
    localStorage.setItem("vipers_user",JSON.stringify(currentUser));
  }

  // Alle Spieler laden (für Verknüpfung)
  const{data:players}=await db.from("players").select("id,vorname,nachname,nummer,teams(name)").eq("club_id",CLUB_ID).eq("aktiv",true).order("nachname");
  allPlayers=players||[];

  // Verknüpfter Spieler
  if(currentUser.rolle==="spieler"){
    const{data:linked}=await db.from("players").select("*,teams(name)").eq("club_id",CLUB_ID).eq("user_id",currentUser.id).single();
    linkedPlayer=linked;
  }

  renderProfile();
  fillForm();
}

function renderProfile(){
  const u=currentUser;
  const init=((u.vorname||"?")[0]+(u.nachname||"?")[0]).toUpperCase();
  document.getElementById("avatar").textContent=init;
  document.getElementById("avatar").style.background=roleColors[u.rolle]+"22";
  document.getElementById("avatar").style.color=roleColors[u.rolle];
  document.getElementById("hero-name").textContent=u.vorname+" "+u.nachname;
  document.getElementById("hero-email").textContent=u.email||"–";
  const badge=document.getElementById("hero-badge");
  badge.textContent=roleLabels[u.rolle]||u.rolle;
  badge.className="role-badge "+(roleBadges[u.rolle]||"");

  // Spieler-Verknüpfung anzeigen
  const linkSection=document.getElementById("player-link-section");
  if(u.rolle==="spieler"){
    linkSection.style.display="block";
    if(linkedPlayer){
      document.getElementById("linked-player-info").innerHTML=
        "<div class='player-link-card'>"+
        "<div class='player-link-avatar'>"+(linkedPlayer.vorname[0]+linkedPlayer.nachname[0])+"</div>"+
        "<div><div style='font-size:13px;font-weight:500'>"+linkedPlayer.vorname+" "+linkedPlayer.nachname+"</div>"+
        "<div style='font-size:11px;color:var(--text3)'>#"+(linkedPlayer.nummer||"–")+" · "+(linkedPlayer.teams?.name?.replace("UHC Jonschwil ","")||"–")+"</div></div>"+
        "<button onclick='unlinkPlayer()' class='btn btn-ghost' style='margin-left:auto;font-size:11px;padding:4px 10px;color:var(--red);border-color:rgba(255,107,107,.3)'>Trennen</button>"+
        "</div>";
      document.getElementById("link-new-section").style.display="none";
    } else {
      document.getElementById("linked-player-info").innerHTML=
        "<div style='font-size:13px;color:var(--text3);padding:10px 0'>Noch kein Spielerprofil verknüpft.</div>";
      document.getElementById("link-new-section").style.display="block";
    }
  } else {
    linkSection.style.display="none";
  }
}

function fillForm(){
  const u=currentUser;
  document.getElementById("f-vorname").value=u.vorname||"";
  document.getElementById("f-nachname").value=u.nachname||"";
  document.getElementById("f-email").value=u.email||"";
  document.getElementById("f-telefon").value=u.telefon||"";
  document.getElementById("f-geburt").value=u.geburtsdatum||"";
  document.getElementById("f-adresse").value=u.adresse||"";
}

async function saveProfil(){
  const btn=document.getElementById("save-btn");
  btn.disabled=true;btn.textContent="Speichern...";
  const data={
    vorname:document.getElementById("f-vorname").value.trim(),
    nachname:document.getElementById("f-nachname").value.trim(),
    telefon:document.getElementById("f-telefon").value.trim()||null,
    geburtsdatum:document.getElementById("f-geburt").value||null,
    adresse:document.getElementById("f-adresse").value.trim()||null,
  };
  if(!data.vorname||!data.nachname){showAlert("profile-alert","error","Bitte Vor- und Nachname ausfüllen.");btn.disabled=false;btn.textContent="Speichern";return;}
  await db.from("user_profiles").update(data).eq("id",currentUser.id);
  // E-Mail ändern (via Supabase Auth)
  const newEmail=document.getElementById("f-email").value.trim();
  if(newEmail&&newEmail!==currentUser.email){
    const{error}=await authClient.updateUser({email:newEmail});
    if(error){showAlert("profile-alert","error","E-Mail konnte nicht geändert werden: "+error.message);}
    else{showAlert("profile-alert","success","Bestätigungs-E-Mail wurde an "+newEmail+" gesendet.");}
  } else {
    showAlert("profile-alert","success","Profil gespeichert!");
  }
  currentUser={...currentUser,...data};
  localStorage.setItem("vipers_user",JSON.stringify(currentUser));
  renderProfile();
  btn.disabled=false;btn.textContent="Speichern";
}

async function changePassword(){
  const np=document.getElementById("new-pass").value;
  const np2=document.getElementById("new-pass2").value;
  if(!np||np.length<6){showAlert("pass-alert","error","Passwort muss min. 6 Zeichen haben.");return;}
  if(np!==np2){showAlert("pass-alert","error","Passwörter stimmen nicht überein.");return;}
  const{error}=await authClient.updateUser({password:np});
  if(error){showAlert("pass-alert","error",error.message);}
  else{showAlert("pass-alert","success","Passwort erfolgreich geändert!");document.getElementById("new-pass").value="";document.getElementById("new-pass2").value="";}
}

// Spieler-Verknüpfung
function searchPlayer(q){
  const res=document.getElementById("player-search-results");
  if(!q||q.length<2){res.classList.remove("open");return;}
  const matches=allPlayers.filter(p=>(p.vorname+" "+p.nachname).toLowerCase().includes(q.toLowerCase()));
  if(!matches.length){res.classList.remove("open");return;}
  res.innerHTML=matches.slice(0,6).map(p=>
    "<div class='player-result-item' onclick=\"linkPlayer('"+p.id+"','"+p.vorname+" "+p.nachname+"')\">"+
    "<div class='p-avatar-sm'>"+(p.vorname[0]+p.nachname[0])+"</div>"+
    "<div><div style='font-weight:500'>"+p.vorname+" "+p.nachname+"</div>"+
    "<div style='font-size:11px;color:var(--text3)'>#"+(p.nummer||"–")+" · "+(p.teams?.name?.replace("UHC Jonschwil ","")||"–")+"</div></div></div>"
  ).join("");
  res.classList.add("open");
}

async function linkPlayer(playerId, name){
  await db.from("players").update({user_id:currentUser.id}).eq("id",playerId);
  document.getElementById("player-search-results").classList.remove("open");
  document.getElementById("player-search-input").value="";
  const{data}=await db.from("players").select("*,teams(name)").eq("id",playerId).single();
  linkedPlayer=data;
  showAlert("profile-alert","success","Spielerprofil verknüpft: "+name);
  renderProfile();
}

async function unlinkPlayer(){
  if(!confirm("Spielerprofil-Verknüpfung wirklich aufheben?"))return;
  if(linkedPlayer) await db.from("players").update({user_id:null}).eq("id",linkedPlayer.id);
  linkedPlayer=null;
  renderProfile();
}

function showAlert(id,type,msg){
  const el=document.getElementById(id);
  el.className="alert "+type;el.textContent=msg;el.style.display="block";
  setTimeout(()=>{el.style.display="none";},4000);
}

document.addEventListener("click",e=>{
  if(!e.target.closest(".player-search-wrap"))
    document.getElementById("player-search-results")?.classList.remove("open");
});

init().catch(console.error);
</script>

<div class="shell">
  <div id="nav-placeholder"></div>
  <div class="main">
    <div class="topbar">
      <a href="dashboard.html" class="back-btn">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Dashboard
      </a>
      <div class="page-title">Mein Profil</div>
    </div>
    <div class="content">

      <!-- Hero -->
      <div class="profile-hero">
        <div class="avatar-large" id="avatar">??</div>
        <div>
          <div class="hero-name" id="hero-name">–</div>
          <div class="hero-meta" id="hero-email">–</div>
          <div id="hero-badge" class="role-badge role-spieler">–</div>
        </div>
      </div>

      <!-- Persönliche Daten -->
      <div class="section-card">
        <div class="section-header">Persönliche Daten</div>
        <div class="section-body">
          <div class="alert" id="profile-alert"></div>
          <div class="form-row">
            <div><label class="form-label">Vorname</label><input class="form-input" type="text" id="f-vorname"></div>
            <div><label class="form-label">Nachname</label><input class="form-input" type="text" id="f-nachname"></div>
          </div>
          <div class="form-row">
            <div><label class="form-label">E-Mail Adresse</label><input class="form-input" type="email" id="f-email"></div>
            <div><label class="form-label">Telefon</label><input class="form-input" type="tel" id="f-telefon" placeholder="+41 79 000 00 00"></div>
          </div>
          <div class="form-row">
            <div><label class="form-label">Geburtsdatum</label><input class="form-input" type="date" id="f-geburt"></div>
            <div><label class="form-label">Adresse</label><input class="form-input" type="text" id="f-adresse" placeholder="Musterstrasse 1, 9244 Niederuzwil"></div>
          </div>
          <button class="btn btn-accent" id="save-btn" onclick="saveProfil()">Speichern</button>
        </div>
      </div>

      <!-- Spielerprofil verknüpfen (nur für Spieler) -->
      <div class="section-card" id="player-link-section" style="display:none">
        <div class="section-header">Spielerprofil</div>
        <div class="section-body">
          <div id="linked-player-info"></div>
          <div id="link-new-section" style="display:none;margin-top:12px">
            <label class="form-label">Spielerprofil suchen und verknüpfen</label>
            <div class="player-search-wrap">
              <input class="form-input" type="text" id="player-search-input" placeholder="Deinen Namen suchen..." oninput="searchPlayer(this.value)" autocomplete="off">
              <div class="player-results" id="player-search-results"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Passwort ändern -->
      <div class="section-card">
        <div class="section-header">Passwort ändern</div>
        <div class="section-body">
          <div class="alert" id="pass-alert"></div>
          <div class="form-row">
            <div><label class="form-label">Neues Passwort</label><input class="form-input" type="password" id="new-pass" placeholder="••••••••" autocomplete="new-password"></div>
            <div><label class="form-label">Passwort bestätigen</label><input class="form-input" type="password" id="new-pass2" placeholder="••••••••" autocomplete="new-password"></div>
          </div>
          <button class="btn btn-ghost" onclick="changePassword()">Passwort ändern</button>
        </div>
      </div>

      <!-- Account löschen -->
      <div class="section-card" style="border-color:rgba(255,107,107,.15)">
        <div class="section-header" style="color:var(--red)">Gefahrenzone</div>
        <div class="section-body">
          <div style="font-size:13px;color:var(--text2);margin-bottom:12px">Nach dem Abmelden wirst du auf die Login-Seite weitergeleitet.</div>
          <button class="btn btn-danger" onclick="logout()">Abmelden</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="nav.js"></script>
<script>
renderNav(null); // Kein aktiver Nav-Eintrag für Profil

function logout(){
  localStorage.removeItem("vipers_user");
  import("https://esm.sh/@supabase/supabase-js@2").then(mod=>{
    mod.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY).auth.signOut();
  });
  window.location.href="login.html";
}
</script>
</body>
</html>
