<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anwesenheit — UHC Jonschwil Vipers</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
a{text-decoration:none}
:root{--bg:#0c0d0f;--bg2:#141518;--bg3:#1c1d22;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#eceaf4;--text2:#8f8d9a;--text3:#4e4c58;--accent:#d4f04a;--accent2:#b8d93a;--purple:#9b8fff;--blue:#5bbfff;--green:#4dd68c;--amber:#ffbe47;--red:#ff6b6b;--r:10px;--r-lg:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{width:230px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:7px;display:grid;place-items:center;flex-shrink:0}
.logo-name{font-family:"Syne",sans-serif;font-size:13px;font-weight:700;line-height:1.2}
.logo-sub{font-size:10px;color:var(--text3);font-family:"DM Mono",monospace;letter-spacing:.1em}
.nav{padding:10px 8px;flex:1}
.nav-sec{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:14px 10px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .12s;text-decoration:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(212,240,74,.1);color:var(--accent);font-weight:500}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.main{flex:1;min-width:0}
.topbar{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.page-title{font-family:"Syne",sans-serif;font-size:22px;font-weight:700}
.page-sub{font-size:12px;color:var(--text3);margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;padding:8px 16px;border-radius:8px;cursor:pointer;border:none;font-family:"DM Sans",sans-serif;transition:all .15s;text-decoration:none}
.btn-accent{background:var(--accent);color:#0c0d0f}.btn-accent:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-ghost:hover{color:var(--text)}
.content{padding:24px 28px}
.two-col{display:grid;grid-template-columns:1fr 280px;gap:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-family:"Syne",sans-serif;font-size:14px;font-weight:600}
.team-pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);color:var(--text2);background:transparent;transition:all .12s;font-family:"DM Sans",sans-serif;margin-right:6px;margin-bottom:6px;display:inline-flex}
.team-pill.active{background:rgba(212,240,74,.1);border-color:rgba(212,240,74,.4);color:var(--accent)}
.attendance-grid{width:100%;border-collapse:collapse}
.attendance-grid th{padding:10px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}
.attendance-grid td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px}
.attendance-grid tr:last-child td{border-bottom:none}
.att-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;font-family:"DM Sans",sans-serif}
.att-an{background:rgba(77,214,140,.2);border-color:rgba(77,214,140,.4);color:var(--green)}
.att-ab{background:rgba(255,107,107,.15);border-color:rgba(255,107,107,.3);color:var(--red)}
.att-ent{background:rgba(255,190,71,.1);border-color:rgba(255,190,71,.3);color:var(--amber)}
.att-off{background:transparent;border-color:var(--border2);color:var(--text3)}
.bar-bg{height:5px;background:var(--border);border-radius:3px;margin-top:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:var(--green);transition:width .4s}
.stat-mini{padding:12px 16px;border-bottom:1px solid var(--border)}
.stat-mini:last-child{border-bottom:none}
.stat-mini-val{font-family:"DM Mono",monospace;font-size:22px;font-weight:400}
.stat-mini-label{font-size:11px;color:var(--text3);margin-top:2px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-lg);padding:26px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:"Syne",sans-serif;font-size:17px;font-weight:700;margin-bottom:20px}
.form-grid{display:grid;gap:14px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-label{display:block;font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:"DM Sans",sans-serif;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>
<script>
const CONFIG={SUPABASE_URL:"https://kpskzbqrfvihxfynwvpv.supabase.co",SUPABASE_KEY:"sb_publishable_eyDYEuo2aQKLLWX_0c8n-g_AttYd0La"};
let db=null,teams=[],players=[],anwesenheit=[],activeTeam=null,activeDatum=null;

async function initDB(){
  const mod=await import("https://esm.sh/@supabase/supabase-js@2");
  db=mod.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_KEY);
  const[t,p,a]=await Promise.all([
    db.from("teams").select("*").eq("aktiv",true).order("name"),
    db.from("players").select("*").eq("aktiv",true).order("nachname"),
    db.from("anwesenheit").select("*").order("training_datum",{ascending:false}),
  ]);
  teams=t.data||[];players=p.data||[];anwesenheit=a.data||[];
  if(teams.length)activeTeam=teams[0].id;
  activeDatum=new Date().toISOString().split("T")[0];
  renderTeamPills();render();
}
function renderTeamPills(){
  const cont=document.getElementById("team-pills");
  cont.innerHTML=teams.map(t=>"<button class='team-pill"+(t.id===activeTeam?" active":"")+"' onclick='setTeam(\""+t.id+"\")'>"+ t.name.replace("UHC Jonschwil ","")+"</button>").join("");
}
function setTeam(id){activeTeam=id;document.querySelectorAll(".team-pill").forEach(p=>p.classList.toggle("active",p.textContent.trim()===teams.find(t=>t.id===id)?.name.replace("UHC Jonschwil ","")));render();}

function render(){
  if(!activeTeam){document.getElementById("main-content").innerHTML="<div style='padding:40px;text-align:center;color:var(--text3)'>Kein Team ausgewaehlt</div>";return;}
  const teamPlayers=players.filter(p=>p.team_id===activeTeam);
  const dates=[...new Set(anwesenheit.filter(a=>teamPlayers.find(p=>p.id===a.player_id)).map(a=>a.training_datum))].sort().reverse().slice(0,8);
  if(!dates.includes(activeDatum))dates.unshift(activeDatum);

  // Stats
  const teamAtt=anwesenheit.filter(a=>teamPlayers.find(p=>p.id===a.player_id));
  const total=teamAtt.length,an=teamAtt.filter(a=>a.status==="anwesend").length;
  document.getElementById("s-quote").textContent=total?Math.round(an/total*100)+"%":"--";
  document.getElementById("s-spieler").textContent=teamPlayers.length;
  const haeufig=teamPlayers.filter(p=>{const pa=teamAtt.filter(a=>a.player_id===p.id);return pa.length>0&&pa.filter(a=>a.status==="abwesend").length/pa.length>0.3;}).length;
  document.getElementById("s-abwesend").textContent=haeufig;

  // Grid
  const cont=document.getElementById("main-content");
  if(!teamPlayers.length){cont.innerHTML="<div style='padding:40px;text-align:center;color:var(--text3)'>Keine Spieler in diesem Team. Fuege Spieler unter Spielplan hinzu.</div>";return;}
  
  const shortDates=dates.slice(0,6);
  let html="<div class='card'><div style='padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between'><span style='font-family:\"Syne\",sans-serif;font-size:14px;font-weight:600'>Anwesenheitsliste</span><div style='display:flex;gap:6px;align-items:center'><input type='date' value='"+activeDatum+"' onchange='activeDatum=this.value;render()' style='background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--text);outline:none'><button class='btn btn-accent' style='font-size:12px;padding:6px 12px' onclick='saveAll()'>Speichern</button></div></div>"+
  "<div style='overflow-x:auto'><table class='attendance-grid'><thead><tr><th>Spieler</th>"+
  shortDates.map(d=>"<th style='text-align:center'>"+new Date(d+"T12:00:00").toLocaleDateString("de-CH",{day:"numeric",month:"short"})+(d===activeDatum?" *":"")+"</th>").join("")+
  "</tr></thead><tbody>"+
  teamPlayers.map(p=>{
    const name=p.vorname+" "+p.nachname;
    const allAtt=anwesenheit.filter(a=>a.player_id===p.id);
    const pct=allAtt.length?Math.round(allAtt.filter(a=>a.status==="anwesend").length/allAtt.length*100):null;
    return "<tr><td><div style='font-weight:500'>"+name+"</div>"+(pct!==null?"<div class='bar-bg'><div class='bar-fill' style='width:"+pct+"%'></div></div><div style='font-size:10px;color:var(--text3);margin-top:2px'>"+pct+"%</div>":"")+"</td>"+
    shortDates.map(d=>{
      const rec=anwesenheit.find(a=>a.player_id===p.id&&a.training_datum===d);
      const st=rec?.status||"offen";
      const btnClass=st==="anwesend"?"att-an":st==="abwesend"?"att-ab":st==="entschuldigt"?"att-ent":"att-off";
      const icon=st==="anwesend"?"✓":st==="abwesend"?"✗":st==="entschuldigt"?"E":"?";
      return "<td style='text-align:center'><button class='att-btn "+btnClass+"' onclick='toggleAtt(\""+p.id+"\",\""+d+"\",\""+st+"\")'>"+icon+"</button></td>";
    }).join("")+"</tr>";
  }).join("")+"</tbody></table></div></div>";
  cont.innerHTML=html;
}

async function toggleAtt(playerId,datum,currentStatus){
  const order=["offen","anwesend","abwesend","entschuldigt"];
  const next=order[(order.indexOf(currentStatus)+1)%order.length];
  const existing=anwesenheit.find(a=>a.player_id===playerId&&a.training_datum===datum);
  if(existing){
    await db.from("anwesenheit").update({status:next}).eq("id",existing.id);
    existing.status=next;
  } else {
    const{data}=await db.from("anwesenheit").insert([{player_id:playerId,training_datum:datum,typ:"training",status:next}]).select().single();
    if(data)anwesenheit.push(data);
  }
  render();
}
async function saveAll(){alert("Anwesenheit gespeichert!");}
document.addEventListener("click",e=>{if(e.target.classList.contains("overlay"))e.target.classList.remove("open");});
initDB().catch(console.error);
</script>
<div class="shell">
  <div id="nav-placeholder"></div>
  <div class="main">
    <div class="topbar">
      <div><div class="page-title">Anwesenheit</div><div class="page-sub">UHC Jonschwil Vipers &middot; Training & Spiele</div></div>
    </div>
    <div class="content">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px">
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px">
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Anwesenheitsquote</div>
          <div style="font-family:'DM Mono',monospace;font-size:28px;color:var(--accent)" id="s-quote">--</div>
        </div>
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px">
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Spieler im Team</div>
          <div style="font-family:'DM Mono',monospace;font-size:28px" id="s-spieler">--</div>
        </div>
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px">
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Oft abwesend (&gt;30%)</div>
          <div style="font-family:'DM Mono',monospace;font-size:28px;color:var(--amber)" id="s-abwesend">--</div>
        </div>
      </div>
      <div style="margin-bottom:16px" id="team-pills"></div>
      <div id="main-content"></div>
    </div>
  </div>
</div>
<script src="nav.js"></script><script>renderNav("anwesenheit");</script>
</body></html>
