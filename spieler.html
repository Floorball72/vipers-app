<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spieler Profil — Stackflow</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
a{text-decoration:none}
:root{--bg:#0c0d0f;--bg2:#141518;--bg3:#1c1d22;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#eceaf4;--text2:#8f8d9a;--text3:#4e4c58;--accent:#d4f04a;--purple:#9b8fff;--blue:#5bbfff;--green:#4dd68c;--amber:#ffbe47;--red:#ff6b6b;--r:10px;--r-lg:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{width:230px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:7px;display:grid;place-items:center;flex-shrink:0}
.logo-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;line-height:1.2}
.logo-sub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:.1em}
.nav{padding:10px 8px;flex:1}
.nav-sec{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:14px 10px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .12s;text-decoration:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(212,240,74,.1);color:var(--accent);font-weight:500}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.main{flex:1;min-width:0}
.topbar{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text3);cursor:pointer;transition:color .12s;border:none;background:none;font-family:'DM Sans',sans-serif;padding:0}
.back-btn:hover{color:var(--text)}
.content{padding:24px 28px}
.player-hero{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px;display:flex;align-items:center;gap:24px;margin-bottom:20px}
.player-avatar{width:72px;height:72px;border-radius:50%;background:rgba(212,240,74,.1);border:2px solid rgba(212,240,74,.3);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:24px;font-weight:500;color:var(--accent);flex-shrink:0}
.player-name{font-family:'Syne',sans-serif;font-size:24px;font-weight:700}
.player-meta{font-size:13px;color:var(--text2);margin-top:4px}
.stat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}
.stat-val{font-family:'DM Mono',monospace;font-size:26px;font-weight:400}
.stat-label{font-size:10px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.card-header{padding:14px 20px;border-bottom:1px solid var(--border);font-family:'Syne',sans-serif;font-size:13px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}
th.r{text-align:right}
td{padding:11px 16px;font-size:13px;border-bottom:1px solid var(--border)}
td.r{text-align:right;font-family:'DM Mono',monospace;font-size:12px}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>
<script src="config.js"></script>
<script>
// Config aus config.js
const CONFIG = APP_CONFIG;
const params=new URLSearchParams(location.search);
const playerId=params.get('id');
let db=null,CLUB_ID="uhc-jonschwil",player=null,entries=[];

async function initDB(){
  const mod=await import('https://esm.sh/@supabase/supabase-js@2.39.0');
  db=mod.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY);
  CLUB_ID=APP_CONFIG.ACTIVE_CLUB.club_id;
  if(!playerId){location.href='spielplan.html';return;}
  const[p,s]=await Promise.all([
    db.from('players').select('*,teams(name,liga)').eq('club_id',CLUB_ID).eq('id',playerId).single(),
    db.from('scorer').select('*,games(datum,gegner,heimspiel)').eq('club_id',CLUB_ID).eq('player_id',playerId).order('games(datum)',{ascending:false}),
  ]);
  player=p.data;entries=s.data||[];
  render();
}

function render(){
  if(!player){document.getElementById('content').innerHTML='<div style="text-align:center;padding:40px;color:var(--text3)">Spieler nicht gefunden</div>';return;}
  const init=(player.vorname[0]||'?')+(player.nachname[0]||'?');
  document.getElementById('player-avatar').textContent=init;
  document.getElementById('player-name').textContent=`${player.vorname} ${player.nachname}`;
  const age=player.geburtsdatum?new Date().getFullYear()-new Date(player.geburtsdatum).getFullYear():'–';
  document.getElementById('player-meta').textContent=`#${player.nummer||'–'} · ${player.position||'–'} · ${player.teams?.name||''} · Jahrgang ${player.geburtsdatum?new Date(player.geburtsdatum).getFullYear():'–'}`;
  document.title=`${player.vorname} ${player.nachname} — UHC Jonschwil Vipers`;

  const tore=entries.reduce((s,x)=>s+(x.tore||0),0);
  const assists=entries.reduce((s,x)=>s+(x.assists||0),0);
  const strafmin=entries.reduce((s,x)=>s+(x.strafminuten||0),0);
  const spiele=entries.length;
  const punkte=tore+assists;
  const ppg=spiele?+(punkte/spiele).toFixed(2):0;

  document.getElementById('stat-spiele').textContent=spiele;
  document.getElementById('stat-tore').textContent=tore;
  document.getElementById('stat-assists').textContent=assists;
  document.getElementById('stat-punkte').textContent=punkte;
  document.getElementById('stat-strafmin').textContent=strafmin+"'";
  document.getElementById('stat-ppg').textContent=ppg;

  document.getElementById('spiele-list').innerHTML=entries.length===0?
    '<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--text3)">Keine Spieldaten vorhanden</td></tr>':
    entries.map(e=>{
      const g=e.games;
      const d=g?new Date(g.datum+'T12:00:00').toLocaleDateString('de-CH',{day:'numeric',month:'short'}):'–';
      const pts=(e.tore||0)+(e.assists||0);
      return `<tr>
        <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)">${d}</td>
        <td>${g?`${g.heimspiel?'vs. ':'@ '}${g.gegner}`:'–'}</td>
        <td class="r" style="color:var(--amber)">${e.tore||0}</td>
        <td class="r" style="color:var(--blue)">${e.assists||0}</td>
        <td class="r" style="color:${pts>0?'var(--accent)':'var(--text3)'}">${pts}</td>
        <td class="r" style="color:var(--text3)">${e.strafminuten||0}'</td>
      </tr>`;
    }).join('');

  // Beste Spiele
  const best=[...entries].sort((a,b)=>((b.tore||0)+(b.assists||0))-((a.tore||0)+(a.assists||0))).slice(0,3);
  document.getElementById('best-games').innerHTML=best.length===0?
    '<div style="padding:16px;color:var(--text3);font-size:13px">–</div>':
    best.map(e=>{
      const g=e.games;
      const d=g?new Date(g.datum+'T12:00:00').toLocaleDateString('de-CH',{day:'numeric',month:'short'}):'–';
      return `<div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <div><div style="font-size:13px;font-weight:500">${g?`${g.heimspiel?'vs. ':'@ '}${g.gegner}`:'–'}</div><div style="font-size:11px;color:var(--text3)">${d}</div></div>
        <div style="font-family:'DM Mono',monospace;font-size:14px;color:var(--accent)">${e.tore||0}T ${e.assists||0}A</div>
      </div>`;
    }).join('');
}

initDB().catch(e=>{console.error(e);const el=document.getElementById("main-content");if(el)el.innerHTML="<div style='text-align:center;padding:40px;color:var(--red);font-size:13px'>Fehler: "+e.message+"<br><small>Seite neu laden oder Supabase-Verbindung prüfen.</small></div>";});
</script>

<div class="shell">
  <div id="nav-placeholder"></div>
  <div class="main">
    <div class="topbar">
      <button class="back-btn" onclick="history.back()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Zurück
      </button>
    </div>
    <div class="content" id="content">
      <div class="player-hero">
        <div class="player-avatar" id="player-avatar">??</div>
        <div>
          <div class="player-name" id="player-name">–</div>
          <div class="player-meta" id="player-meta"></div>
        </div>
      </div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-val" id="stat-spiele">–</div><div class="stat-label">Spiele</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--amber)" id="stat-tore">–</div><div class="stat-label">Tore</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--blue)" id="stat-assists">–</div><div class="stat-label">Assists</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--accent)" id="stat-punkte">–</div><div class="stat-label">Punkte</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--red)" id="stat-strafmin">–</div><div class="stat-label">Strafmin.</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--purple)" id="stat-ppg">–</div><div class="stat-label">Pkt/Spiel</div></div>
      </div>
      <div class="two-col">
        <div class="card">
          <div class="card-header">Spiele & Statistiken</div>
          <table><thead><tr><th>Datum</th><th>Spiel</th><th class="r" style="color:var(--amber)">T</th><th class="r" style="color:var(--blue)">A</th><th class="r">Pkt</th><th class="r">Str</th></tr></thead>
          <tbody id="spiele-list"></tbody></table>
        </div>
        <div class="card">
          <div class="card-header">Beste Spiele</div>
          <div id="best-games"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="nav.js"></script><script>renderNav('scorer');</script>
</body></html>
