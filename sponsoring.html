<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sponsoring — Stackflow</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
a{text-decoration:none}
:root{--bg:#0c0d0f;--bg2:#141518;--bg3:#1c1d22;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#eceaf4;--text2:#8f8d9a;--text3:#4e4c58;--accent:#d4f04a;--accent2:#b8d93a;--purple:#9b8fff;--blue:#5bbfff;--green:#4dd68c;--amber:#ffbe47;--red:#ff6b6b;--r:10px;--r-lg:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{width:230px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:7px;display:grid;place-items:center;flex-shrink:0}
.logo-name{font-family:"Syne",sans-serif;font-size:13px;font-weight:700;line-height:1.2}
.logo-sub{font-size:10px;color:var(--text3);font-family:"DM Mono",monospace;letter-spacing:.1em}
.nav{padding:10px 8px;flex:1}
.nav-sec{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:14px 10px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .12s;text-decoration:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(212,240,74,.1);color:var(--accent);font-weight:500}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.main{flex:1;min-width:0}
.topbar{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px}
.page-title{font-family:"Syne",sans-serif;font-size:22px;font-weight:700}
.page-sub{font-size:12px;color:var(--text3);margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;padding:8px 16px;border-radius:8px;cursor:pointer;border:none;font-family:"DM Sans",sans-serif;transition:all .15s;text-decoration:none}
.btn-accent{background:var(--accent);color:#0c0d0f}.btn-accent:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-ghost:hover{color:var(--text)}
.content{padding:24px 28px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.stat-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.stat-val{font-family:"DM Mono",monospace;font-size:26px;font-weight:400}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.two-col{display:grid;grid-template-columns:1fr 320px;gap:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-family:"Syne",sans-serif;font-size:14px;font-weight:600}
.sponsor-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;margin-bottom:12px;cursor:pointer;transition:border-color .15s}
.sponsor-card:hover{border-color:var(--border2)}
.sponsor-name{font-size:15px;font-weight:600;margin-bottom:4px}
.sponsor-meta{font-size:12px;color:var(--text2);display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.kat-badge{display:inline-flex;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em}
.kat-haupt{background:rgba(212,240,74,.15);color:var(--accent);border:1px solid rgba(212,240,74,.3)}
.kat-partner{background:rgba(155,143,255,.12);color:var(--purple);border:1px solid rgba(155,143,255,.25)}
.kat-gonn{background:rgba(91,191,255,.1);color:var(--blue);border:1px solid rgba(91,191,255,.2)}
.status-aktiv{color:var(--green)}
.status-inaktiv{color:var(--text3)}
.status-verh{color:var(--amber)}
.leistung-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.leistung-row:last-child{border-bottom:none}
.leistung-check{width:16px;height:16px;border-radius:4px;border:1px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.leistung-check.done{background:rgba(77,214,140,.2);border-color:rgba(77,214,140,.4)}
.row-actions{display:flex;gap:5px}
.icon-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.icon-btn:hover{color:var(--text)}.icon-btn.del:hover{color:var(--red);border-color:rgba(255,107,107,.3);background:rgba(255,107,107,.08)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-lg);padding:26px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:"Syne",sans-serif;font-size:17px;font-weight:700;margin-bottom:20px}
.form-grid{display:grid;gap:14px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-label{display:block;font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:"DM Sans",sans-serif;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>
<script src="config.js"></script>
<script>
// Config aus config.js
const CONFIG = APP_CONFIG;
let db=null,CLUB_ID="uhc-jonschwil",sponsoren=[],leistungen=[],editId=null,detailId=null,logoUrl=null;
const CHF=n=>n!=null?"CHF "+parseFloat(n).toLocaleString("de-CH",{minimumFractionDigits:0}):"–";

async function initDB(){
  const mod=await import("https://esm.sh/@supabase/supabase-js@2");
  db=mod.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY);
  CLUB_ID=APP_CONFIG.ACTIVE_CLUB.club_id;
  await loadAll();
}
async function loadAll(){
  const[s,l]=await Promise.all([
    db.from('sponsoren').select("*").eq('club_id',CLUB_ID).order("firmenname"),
    db.from('sponsor_leistungen').select("*").eq('club_id',CLUB_ID),
  ]);
  sponsoren=s.data||[];leistungen=l.data||[];
  render();updateStats();
}
function updateStats(){
  const aktiv=sponsoren.filter(s=>s.status==="aktiv");
  const total=aktiv.reduce((sum,s)=>sum+(parseFloat(s.betrag_jahr)||0),0);
  document.getElementById("s-total").textContent=sponsoren.length;
  document.getElementById("s-aktiv").textContent=aktiv.length;
  document.getElementById("s-budget").textContent=CHF(total);
  const offen=leistungen.filter(l=>!l.erledigt).length;
  document.getElementById("s-offen").textContent=offen;
}
function render(){
  const cont=document.getElementById("main-content");
  if(!sponsoren.length){cont.innerHTML="<div style='text-align:center;padding:60px;color:var(--text3)'><div style='font-size:15px;font-weight:500;color:var(--text2);margin-bottom:8px'>Noch keine Sponsoren</div><button class='btn btn-accent' onclick='openModal()'>+ Ersten Sponsor erfassen</button></div>";return;}
  cont.innerHTML=sponsoren.map(s=>{
    const sLeistungen=leistungen.filter(l=>l.sponsor_id===s.id);
    const done=sLeistungen.filter(l=>l.erledigt).length;
    const katCls=s.kategorie==="Hauptsponsor"?"kat-haupt":s.kategorie==="Partner"?"kat-partner":"kat-gonn";
    const statusCls=s.status==="aktiv"?"status-aktiv":s.status==="verhandlung"?"status-verh":"status-inaktiv";
    return "<div class='sponsor-card' onclick='openDetail(\""+s.id+"\")'>"
      +"<div style='display:flex;align-items:start;justify-content:space-between'>"
      +"<div><div class='kat-badge "+katCls+"'>"+(s.kategorie||"Sponsor")+"</div><div class='sponsor-name'>"+s.firmenname+"</div>"
      +"<div class='sponsor-meta'><span>"+CHF(s.betrag_jahr)+"/Jahr</span>"+(s.kontaktperson?"<span>"+s.kontaktperson+"</span>":"")+( s.vertrag_ende?"<span>bis "+s.vertrag_ende+"</span>":"")+"</div>"
      +"</div><div style='display:flex;flex-direction:column;align-items:flex-end;gap:8px'>"
      +"<span class='"+statusCls+"' style='font-size:12px;font-weight:500'>"+{"aktiv":"Aktiv","inaktiv":"Inaktiv","verhandlung":"In Verhandlung"}[s.status]+"</span>"
      +(sLeistungen.length?"<span style='font-size:11px;color:var(--text3)'>"+done+"/"+sLeistungen.length+" Leistungen</span>":"")
      +"<div class='row-actions'><button class='icon-btn' onclick='event.stopPropagation();openEdit(\""+s.id+"\")' title='Bearbeiten'><svg width='13' height='13' viewBox='0 0 16 16' fill='none'><path d='M11 2l3 3L5 14H2v-3L11 2Z' stroke='currentColor' stroke-width='1.3' stroke-linecap='round' stroke-linejoin='round'/></svg></button>"
      +"<button class='icon-btn del' onclick='event.stopPropagation();deleteSponsor(\""+s.id+"\")' title='Löschen'><svg width='13' height='13' viewBox='0 0 16 16' fill='none'><path d='M3 5h10M6 5V3h4v2M6 8v4M10 8v4' stroke='currentColor' stroke-width='1.3' stroke-linecap='round'/></svg></button></div>"
      +"</div></div>"
      +(sLeistungen.length?"<div style='margin-top:10px;padding-top:10px;border-top:1px solid var(--border)'>"
      +sLeistungen.slice(0,3).map(l=>"<div class='leistung-row'><div class='leistung-check "+(l.erledigt?"done":"")+"' onclick='event.stopPropagation();toggleLeistung(\""+l.id+"\","+l.erledigt+")'>"+( l.erledigt?"<svg width='10' height='10' viewBox='0 0 10 10' fill='none'><path d='M2 5l2 2.5L8 3' stroke='var(--green)' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/></svg>":"")+"</div>"
      +"<span style='flex:1;color:"+(l.erledigt?"var(--text3)":"var(--text2)")+(l.erledigt?";text-decoration:line-through":"")+"'>"+l.beschreibung+"</span>"
      +(l.faellig_am?"<span style='font-size:10px;color:var(--text3)'>"+l.faellig_am+"</span>":"")
      +"</div>").join("")
      +(sLeistungen.length>3?"<div style='font-size:11px;color:var(--text3);padding:4px 0'>+"+( sLeistungen.length-3)+" weitere...</div>":"")
      +"<button class='btn btn-ghost' style='font-size:11px;padding:4px 12px;margin-top:6px' onclick='event.stopPropagation();addLeistung(\""+s.id+"\")'>+ Leistung hinzufügen</button>"
      +"</div>":"")
      +"</div>";
  }).join("");
}

function openModal(){editId=null;["sf-firma","sf-kontakt","sf-email","sf-telefon","sf-website","sf-betrag"].forEach(id=>document.getElementById(id).value="");document.getElementById("sf-kat").value="Partner";document.getElementById("sf-status").value="aktiv";document.getElementById("sf-start").value="";document.getElementById("sf-ende").value="";logoUrl=null;document.getElementById("sponsorModal").classList.add("open");setTimeout(()=>UPLOAD.render("logo-upload",{label:"Logo hochladen (PNG/JPG)",folder:"logos",onSuccess:(u)=>{logoUrl=u;}}),50);}
function openEdit(id){const s=sponsoren.find(x=>x.id===id);if(!s)return;editId=id;document.getElementById("sf-firma").value=s.firmenname||"";document.getElementById("sf-kontakt").value=s.kontaktperson||"";document.getElementById("sf-email").value=s.email||"";document.getElementById("sf-telefon").value=s.telefon||"";document.getElementById("sf-website").value=s.website||"";document.getElementById("sf-betrag").value=s.betrag_jahr||"";document.getElementById("sf-kat").value=s.kategorie||"Partner";document.getElementById("sf-status").value=s.status||"aktiv";document.getElementById("sf-start").value=s.vertrag_start||"";document.getElementById("sf-ende").value=s.vertrag_ende||"";document.getElementById("sponsorModal").classList.add("open");}
function openDetail(id){openEdit(id);}
function closeModal(){document.getElementById("sponsorModal").classList.remove("open");editId=null;}
async function saveSponsor(){
  const data={firmenname:document.getElementById("sf-firma").value,logo_url:logoUrl||null,kontaktperson:document.getElementById("sf-kontakt").value||null,email:document.getElementById("sf-email").value||null,telefon:document.getElementById("sf-telefon").value||null,website:document.getElementById("sf-website").value||null,betrag_jahr:parseFloat(document.getElementById("sf-betrag").value)||null,kategorie:document.getElementById("sf-kat").value,status:document.getElementById("sf-status").value,vertrag_start:document.getElementById("sf-start").value||null,vertrag_ende:document.getElementById("sf-ende").value||null};
  if(!data.firmenname){alert("Bitte Firmenname eingeben.");return;}
  if(editId){await db.from("sponsoren").update(data).eq("id",editId);}else{await db.from("sponsoren").insert([{club_id:CLUB_ID,...data}]);}
  closeModal();await loadAll();
}
async function deleteSponsor(id){if(!confirm("Sponsor wirklich löschen?"))return;await db.from("sponsoren").delete().eq("id",id);await loadAll();}
async function toggleLeistung(id,done){await db.from("sponsor_leistungen").update({erledigt:!done}).eq("id",id);await loadAll();}
async function addLeistung(sponsorId){
  const text=prompt("Leistung beschreiben (z.B. Logo auf Trikot, Social-Post):");
  if(!text)return;
  await db.from("sponsor_leistungen").insert([{club_id:CLUB_ID,sponsor_id:sponsorId,beschreibung:text}]);
  await loadAll();
}
document.addEventListener("click",e=>{if(e.target.classList.contains("overlay"))e.target.classList.remove("open");});
initDB().catch(console.error);
</script>

<div class="shell">
  <div id="nav-placeholder"></div>
  <div class="main">
    <div class="topbar">
      <div><div class="page-title">Sponsoring</div><div class="page-sub">APP_CONFIG.ACTIVE_CLUB.name+' ·' Sponsoren & Verträge</div></div>
      <button class="btn btn-accent" onclick="openModal()">+ Sponsor erfassen</button>
    </div>
    <div class="content">
      <div class="stat-grid">
        <div class="stat"><div class="stat-label">Sponsoren total</div><div class="stat-val" id="s-total">–</div></div>
        <div class="stat"><div class="stat-label">Aktive Verträge</div><div class="stat-val" style="color:var(--green)" id="s-aktiv">–</div></div>
        <div class="stat"><div class="stat-label">Budget/Jahr</div><div class="stat-val" style="font-size:18px;padding-top:4px" id="s-budget">–</div></div>
        <div class="stat"><div class="stat-label">Leistungen offen</div><div class="stat-val" style="color:var(--amber)" id="s-offen">–</div></div>
      </div>
      <div id="main-content"><div style="text-align:center;padding:40px;color:var(--text3)">Lade...</div></div>
    </div>
  </div>
</div>

<div class="overlay" id="sponsorModal">
  <div class="modal">
    <div class="modal-title">Sponsor erfassen</div>
    <div class="form-grid">
      <div class="form-row-2">
        <div><label class="form-label">Firmenname</label><input class="form-input" type="text" id="sf-firma" placeholder="Musterfirma AG"></div>
        <div><label class="form-label">Kategorie</label><select class="form-input" id="sf-kat"><option>Hauptsponsor</option><option>Partner</option><option>Gönner</option></select></div>
      </div>
      <div class="form-row-2">
        <div><label class="form-label">Kontaktperson</label><input class="form-input" type="text" id="sf-kontakt"></div>
        <div><label class="form-label">E-Mail</label><input class="form-input" type="email" id="sf-email"></div>
      </div>
      <div class="form-row-2">
        <div><label class="form-label">Telefon</label><input class="form-input" type="tel" id="sf-telefon"></div>
        <div><label class="form-label">Website</label><input class="form-input" type="url" id="sf-website" placeholder="https://"></div>
      </div>
      <div>
        <label class="form-label">Logo (optional)</label>
        <div id="logo-upload"></div>
      </div>
      <div class="form-row-2">
        <div><label class="form-label">Betrag/Jahr (CHF)</label><input class="form-input" type="number" id="sf-betrag" min="0" step="100"></div>
        <div><label class="form-label">Status</label><select class="form-input" id="sf-status"><option value="aktiv">Aktiv</option><option value="verhandlung">In Verhandlung</option><option value="inaktiv">Inaktiv</option></select></div>
      </div>
      <div class="form-row-2">
        <div><label class="form-label">Vertrag von</label><input class="form-input" type="date" id="sf-start"></div>
        <div><label class="form-label">Vertrag bis</label><input class="form-input" type="date" id="sf-ende"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-accent" onclick="saveSponsor()">Speichern</button>
    </div>
  </div>
</div>

<script src="upload.js"></script>
<script src="nav.js"></script><script>renderNav("sponsoring");</script>
</body></html>
